<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MapTap Tracker — Suspects</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { 
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; 
  margin: 0; 
  padding: 20px; 
  background: transparent; 
  color: #1a1a1a; 
  max-width: 1200px;
  margin: 0 auto;
}
h1 { margin: 0 0 8px 0; font-size: 28px; color: #1F4E78; }
.sub { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
@media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
.card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
h2 { margin: 0 0 16px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #1F4E78; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: center; padding: 10px; background: #f3f4f6; font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb; }
td { padding: 10px; border-bottom: 1px solid #f3f4f6; text-align: center; }
td:first-child { text-align: left; }
tr:last-child td { border-bottom: none; }
.date { font-weight: 600; color: #1F4E78; }
.winner { background: #fef3c7; font-weight: 600; }
.name { text-align: left; }
.footer { font-size: 11px; color: #9ca3af; margin-top: 24px; text-align: center; }
</style>
</head>
<body>
<h1>MapTap Tracker — Suspects</h1>
<div class="sub" id="subtitle"></div>

<div class="grid">
  <div class="card">
    <h2>Daily Scores</h2>
    <table id="scores-table">
      <thead><tr id="header"></tr></thead>
      <tbody id="scores"></tbody>
    </table>
  </div>
  
  <div class="card">
    <h2>Leaderboard</h2>
    <table>
      <thead><tr><th>Rank</th><th class="name">Name</th><th>Wins</th><th>Games</th><th>Win %</th></tr></thead>
      <tbody id="leaderboard"></tbody>
    </table>
  </div>
</div>

<div class="footer">Data from MapTap_Tracker.xlsx. Updated from Suspects group chat. <a href="https://github.com/jgleason923/maptap-tracker" style="color: #6b7280;">GitHub</a></div>

<script>
const DATA = {"players": ["James", "Joey", "Greg", "Brendan", "Connor", "Mark"], "dates": ["2026-04-19", "2026-04-20", "2026-04-22", "2026-04-23", "2026-04-24"], "scores": {"2026-04-19": {"Joey": 805, "Brendan": 893, "Mark": 716, "Greg": 852, "Connor": 923}, "2026-04-20": {"Connor": 846, "Joey": 830, "Greg": 831}, "2026-04-22": {"Greg": 791, "James": 885, "Brendan": 871, "Joey": 747, "Connor": 859}, "2026-04-23": {"James": 934, "Connor": 763, "Brendan": 876, "Greg": 921, "Joey": 892}, "2026-04-24": {"James": 812, "Mark": 937, "Brendan": 857, "Greg": 827}}, "winners": {"2026-04-19": "Connor", "2026-04-20": "Connor", "2026-04-22": "James", "2026-04-23": "James", "2026-04-24": "Mark"}, "leaderboard": [{"name": "Connor", "wins": 2, "games": 4, "win_pct": 50}, {"name": "James", "wins": 2, "games": 3, "win_pct": 67}, {"name": "Mark", "wins": 1, "games": 2, "win_pct": 50}, {"name": "Brendan", "wins": 0, "games": 4, "win_pct": 0}, {"name": "Greg", "wins": 0, "games": 5, "win_pct": 0}, {"name": "Joey", "wins": 0, "games": 4, "win_pct": 0}]};

// Build scores table
const headerRow = document.getElementById("header");
const headerCells = ["<th style='text-align: left;'>Date</th>"];
headerCells.push(...DATA.players.map(p => `<th>${p}</th>`));
headerCells.push("<th>Winner</th>");
headerRow.innerHTML = headerCells.join("");

const scoresBody = document.getElementById("scores");
const rows = DATA.dates.map(d => {
  const dayScores = DATA.scores[d] || {};
  const winner = DATA.winners[d] || "—";
  const cells = [];
  cells.push(`<td class="date">${new Date(d + "T12:00:00").toLocaleDateString("en-US", {month: "short", day: "numeric"})}</td>`);
  for (let p of DATA.players) {
    const score = dayScores[p];
    const isWinner = p === winner ? " winner" : "";
    cells.push(`<td class="${isWinner}">${score || "—"}</td>`);
  }
  cells.push(`<td class="winner">${winner}</td>`);
  return `<tr>${cells.join("")}</tr>`;
});
scoresBody.innerHTML = rows.join("");

// Build leaderboard
const leaderboardBody = document.getElementById("leaderboard");
const lbRows = DATA.leaderboard.map((entry, idx) => `
  <tr>
    <td>${idx + 1}</td>
    <td class="name">${entry.name}</td>
    <td>${entry.wins}</td>
    <td>${entry.games}</td>
    <td>${entry.win_pct}%</td>
  </tr>
`);
leaderboardBody.innerHTML = lbRows.join("");

document.getElementById("subtitle").textContent = `${DATA.dates.length} days · Last updated ${new Date().toLocaleDateString("en-US", {month: "short", day: "numeric"})}`;
</script>
</body>
</html>
